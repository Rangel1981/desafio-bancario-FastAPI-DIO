version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: banking_db
    restart: always
    environment:
      POSTGRES_USER: user_api
      POSTGRES_PASSWORD: password_api
      POSTGRES_DB: banking_db
    ports:
      - "5432:5432" # Porta padrão do Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: